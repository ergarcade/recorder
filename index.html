<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>PM5 Recorder</title>

        <script src="pm5-base/lib/pm5-ble.js"></script>
        <script src="pm5-base/lib/pm5-hid.js"></script>
        <script src="pm5-base/lib/pm5-mock.js"></script>
        <script src="pm5-base/lib/mock-data/csv-source.js"></script>
        <script src="pm5-base/lib/mock-data/events-source.js"></script>
        <script src="pm5-base/lib/pm5-fields.js"></script>
        <script src="slots.js"></script>
        <script src="csv.js"></script>
        <script src="events.js"></script>
        <script src="app.js"></script>

        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <h1>PM5 Recorder</h1>
            <div id="controls">
                <select id="transport" aria-label="Transport">
                    <option value="bluetooth">Bluetooth</option>
                    <option value="usb">USB</option>
                    <option value="mock">Mock</option>
                </select>
                <select id="mock-speed" aria-label="Mock replay speed" hidden>
                    <option value="1" selected>1x</option>
                    <option value="2">2x</option>
                    <option value="4">4x</option>
                    <option value="8">8x</option>
                    <option value="16">16x</option>
                </select>
                <input type="file" id="mock-file" aria-label="Workout file to replay (Concept2 Logbook CSV or our own JSON export)" accept=".csv,.json" hidden>
                <button id="connect">Connect</button>
            </div>
        </header>

        <main>
            <div id="recording-status">
                <div class="recording-row">
                    <span><span id="sample-count" class="count">0</span> samples recorded</span>
                    <button id="export" disabled>Export CSV (Concept2 Logbook)</button>
                </div>
                <div class="recording-row">
                    <span><span id="event-count" class="count">0</span> events recorded</span>
                    <button id="export-events" disabled>Export Events (JSON)</button>
                </div>
            </div>

            <!-- Canonical cards: the reduced, always-present fields the CSV export uses. -->
            <div class="readout">
                <div class="cell">
                    <span class="cell-label">Time</span>
                    <span class="cell-value" id="current-t">--</span>
                </div>
                <div class="cell">
                    <span class="cell-label">Distance</span>
                    <span class="cell-value" id="current-distance">--</span>
                </div>
                <div class="cell">
                    <span class="cell-label">Pace /500m</span>
                    <span class="cell-value" id="current-pace">--</span>
                </div>
                <div class="cell">
                    <span class="cell-label">Watts</span>
                    <span class="cell-value" id="current-watts">--</span>
                </div>
                <div class="cell">
                    <span class="cell-label">Cal/Hr</span>
                    <span class="cell-value" id="current-calPerHour">--</span>
                </div>
                <div class="cell">
                    <span class="cell-label">Stroke Rate</span>
                    <span class="cell-value" id="current-strokeRate">--</span>
                </div>
                <div class="cell">
                    <span class="cell-label">Heart Rate</span>
                    <span class="cell-value" id="current-heartRate">--</span>
                </div>
            </div>

            <!-- One small card per raw metric key, updated in place as data arrives -- see app.js's updateMetricCards. -->
            <div id="metric-cards" class="metric-cards"></div>
        </main>
    </body>
</html>
